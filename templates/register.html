{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Register</h2>
        <form method="POST">
            <div class="form-group">
                <label>Register As</label>
                <select name="role" class="form-control" required>
                    <option value="student" {% if request.args.get('type') != 'alumni' %}selected{% endif %}>Student</option>
                    <option value="alumni" {% if request.args.get('type') == 'alumni' %}selected{% endif %}>Alumni</option>
                </select>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center;">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
