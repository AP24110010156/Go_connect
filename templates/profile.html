{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2 style="margin-bottom: 1.5rem;">Update Profile</h2>
    <form method="POST">
        <div class="grid-2">
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" class="form-control" value="{{ profile.department or '' }}" placeholder="e.g. Engineering">
            </div>
            <div class="form-group">
                <label>Branch</label>
                <input type="text" name="branch" class="form-control" value="{{ profile.branch or '' }}" placeholder="e.g. Computer Science">
            </div>
        </div>
        
        <div class="grid-2">
            <div class="form-group">
                <label>Pass-out / Current Year</label>
                <input type="text" name="year" class="form-control" value="{{ profile.year or '' }}">
            </div>
            <div class="form-group">
                <label>Skills (comma separated)</label>
                <input type="text" name="skills" class="form-control" value="{{ profile.skills or '' }}" placeholder="Python, React, AWS">
            </div>
        </div>

        {% if session['role'] == 'alumni' %}
        <div class="grid-2">
            <div class="form-group">
                <label>Current Company</label>
                <input type="text" name="company" class="form-control" value="{{ profile.company or '' }}">
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation" class="form-control" value="{{ profile.designation or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Achievements</label>
            <textarea name="achievements" class="form-control" rows="3">{{ profile.achievements or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="mentor_willing" value="1" {% if profile.mentor_willing %}checked{% endif %}> 
                Willing to Mentor Students
            </label>
        </div>
        {% else %}
        <div class="form-group">
            <label>Interests / Career Goals</label>
            <textarea name="interests" class="form-control" rows="3">{{ profile.interests or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>Resume Link</label>
            <input type="url" name="resume" class="form-control" value="{{ profile.resume or '' }}" placeholder="https://docs.google.com/...">
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Save Changes</button>
    </form>
</div>
{% endblock %}
