{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 1.5rem;">Post New Event</h2>
    <form method="POST">
        <div class="form-group">
            <label>Event Title</label>
            <input type="text" name="title" class="form-control" required placeholder="e.g. Resume Building Workshop">
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" name="time" class="form-control" required>
            </div>
        </div>
        <div class="form-group">
            <label>Venue or Online Link</label>
            <input type="text" name="venue" class="form-control" required placeholder="Zoom link or Google Meet link, or physical location">
        </div>
        <div class="form-group">
            <label>Description & Agenda</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Create Event</button>
    </form>
</div>
{% endblock %}
